<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbos — Spanish Verb Mastery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#1a1510;--bg-warm:#221c14;--bg-card:#2a231a;--bg-card-hover:#342b20;
  --surface:#3a3128;--border:#4a3f32;--border-light:#5a4d3e;
  --text:#f0e6d6;--text-dim:#b8a88e;--text-muted:#8a7a64;
  --accent:#e8a84c;--accent-glow:#e8a84c44;--accent-dim:#c48a30;
  --correct:#6abf69;--correct-bg:#6abf6920;
  --incorrect:#e06050;--incorrect-bg:#e0605020;
  --t-present:#e8a84c;--t-preterite:#6ab0e8;--t-imperfect:#b07ae8;
  --t-future:#6ae8a0;--t-conditional:#e86a8a;--t-subjunctive:#e8c86a;
  --radius:12px;--radius-sm:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,#3a2a1520 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,#2a1a0a30 0%,transparent 60%);pointer-events:none}
.app{position:relative;z-index:1}
header{padding:2rem 2rem 1rem;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(180deg,var(--bg-warm),transparent)}
header h1{font-family:'DM Serif Display',serif;font-size:2.8rem;color:var(--accent);letter-spacing:.02em;margin-bottom:.25rem;text-shadow:0 2px 20px var(--accent-glow)}
header h1 span{font-style:italic;color:var(--text);font-size:.6em;opacity:.6;margin-left:.3em}
header p{color:var(--text-muted);font-size:.95rem;max-width:500px;margin:0 auto}
.nav-tabs{display:flex;justify-content:center;gap:.5rem;padding:1rem 1rem 0;flex-wrap:wrap}
.nav-tab{background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);padding:.6rem 1.4rem;border-radius:99px;font-family:'Source Sans 3',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .25s}
.nav-tab:hover{background:var(--bg-card-hover);color:var(--text)}
.nav-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.stats-bar{display:flex;justify-content:center;gap:2rem;padding:1rem 2rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--accent)}
.stat-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}
main{max-width:800px;margin:0 auto;padding:1.5rem}
.settings-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem}
.settings-panel h3{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:1rem;color:var(--accent)}
.setting-group{margin-bottom:1rem}
.setting-group label{display:block;font-size:.85rem;color:var(--text-dim);margin-bottom:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem}
.chip{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:.4rem .9rem;border-radius:99px;font-size:.82rem;font-family:'Source Sans 3',sans-serif;cursor:pointer;transition:all .2s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.progress-track{height:6px;background:var(--surface);border-radius:99px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:99px;transition:width .4s ease;width:0%}
.flashcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;text-align:center;min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s;animation:slideIn .4s ease;margin-bottom:1.5rem}
.flashcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-dim),var(--accent));opacity:.6}
.flashcard.correct{border-color:var(--correct);box-shadow:0 0 30px var(--correct-bg)}
.flashcard.incorrect{border-color:var(--incorrect);box-shadow:0 0 30px var(--incorrect-bg)}
.card-tense{font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;font-weight:700;padding:.3rem .8rem;border-radius:99px;margin-bottom:1rem;background:var(--surface)}
.card-pronoun{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--text-muted);margin-bottom:.3rem}
.card-sentence{font-family:'DM Serif Display',serif;font-size:1.6rem;line-height:1.4;margin-bottom:.5rem}
.card-sentence .blank{display:inline-block;min-width:120px;border-bottom:3px dashed var(--accent);margin:0 .2rem;padding:0 .3rem;color:var(--accent);font-family:'JetBrains Mono',monospace}
.card-english{font-size:.95rem;color:var(--text-muted);font-style:italic;margin-top:.25rem}
.card-infinitive{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent-dim);margin-top:.5rem;padding:.2rem .6rem;background:var(--accent-glow);border-radius:var(--radius-sm)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.5rem}
.choice-btn{background:var(--bg-card);border:2px solid var(--border);color:var(--text);padding:1rem;border-radius:var(--radius);font-family:'JetBrains Mono',monospace;font-size:1.05rem;cursor:pointer;transition:all .2s;position:relative}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.choice-btn:active:not(:disabled){transform:translateY(0)}
.choice-btn.correct-choice{border-color:var(--correct);background:var(--correct-bg);color:var(--correct)}
.choice-btn.incorrect-choice{border-color:var(--incorrect);background:var(--incorrect-bg);color:var(--incorrect);opacity:.7}
.choice-btn:disabled{cursor:default}
.choice-btn .key-hint{position:absolute;top:4px;left:8px;font-size:.65rem;color:var(--text-muted);font-family:'Source Sans 3',sans-serif}
.feedback{text-align:center;padding:1rem;border-radius:var(--radius);margin-bottom:1rem;font-weight:600;display:none}
.feedback.show{display:block}
.feedback.correct-fb{background:var(--correct-bg);color:var(--correct);border:1px solid #6abf6940}
.feedback.incorrect-fb{background:var(--incorrect-bg);color:var(--incorrect);border:1px solid #e0605040}
.feedback .explanation{font-weight:400;font-size:.9rem;margin-top:.3rem;opacity:.85}
.next-btn{display:none;width:100%;padding:1rem;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:'Source Sans 3',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.03em}
.next-btn.show{display:block}
.next-btn:hover{background:var(--accent-dim);transform:translateY(-1px)}
.reference-view{display:none}.reference-view.active{display:block}
.practice-view{display:none}.practice-view.active{display:block}
.conjugation-view{display:none}.conjugation-view.active{display:block}
.results-screen{display:none;text-align:center;padding:3rem 2rem}
.results-screen.active{display:block}
.search-box{width:100%;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:.8rem 1.2rem;border-radius:var(--radius);font-family:'Source Sans 3',sans-serif;font-size:1rem;margin-bottom:1rem;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}.search-box::placeholder{color:var(--text-muted)}
.verb-count{text-align:center;padding:.5rem;color:var(--text-muted);font-size:.85rem}
.table-scroll{max-height:65vh;overflow-y:auto;border-radius:var(--radius)}
.table-scroll::-webkit-scrollbar{width:8px}
.table-scroll::-webkit-scrollbar-track{background:var(--bg-card)}
.table-scroll::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:99px}
.verb-table{width:100%;border-collapse:separate;border-spacing:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.verb-table th{background:var(--surface);padding:.7rem 1rem;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);font-weight:700;position:sticky;top:0}
.verb-table td{padding:.6rem 1rem;border-top:1px solid var(--border);font-size:.9rem}
.verb-table tr:hover td{background:var(--bg-card-hover)}
.verb-es{font-weight:600;color:var(--accent)}.verb-en{color:var(--text-dim)}
.verb-type{font-family:'JetBrains Mono',monospace;font-size:.75rem;padding:.15rem .5rem;border-radius:99px;background:var(--surface);color:var(--text-muted)}
.verb-type.irregular{background:var(--incorrect-bg);color:var(--incorrect)}
.conj-back-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:.4rem 1rem;border-radius:99px;font-family:'Source Sans 3',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
.conj-back-btn:hover{color:var(--text);border-color:var(--accent)}
.conj-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}
.conj-header h2{font-family:'DM Serif Display',serif;font-size:2rem;color:var(--accent)}
.conj-header .meaning{color:var(--text-dim);font-style:italic;font-size:1.1rem}
.conj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem}
.conj-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem}
.conj-card h4{font-family:'Source Sans 3',sans-serif;font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:2px solid var(--border)}
.conj-row{display:flex;justify-content:space-between;padding:.3rem 0;font-size:.9rem}
.conj-row .pronoun{color:var(--text-muted)}
.conj-row .form{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.results-score{font-family:'DM Serif Display',serif;font-size:4rem;color:var(--accent);margin-bottom:.5rem}
.results-label{font-size:1.1rem;color:var(--text-dim);margin-bottom:2rem}
.results-details{display:flex;justify-content:center;gap:3rem;margin-bottom:2rem}
.rd-num{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600}
.rd-num.green{color:var(--correct)}.rd-num.red{color:var(--incorrect)}
.rd-label{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}
.restart-btn{display:inline-block;padding:1rem 3rem;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-family:'Source Sans 3',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s}
.restart-btn:hover{background:var(--accent-dim)}
.tense-tooltip{position:fixed;bottom:1.5rem;right:1.5rem;max-width:340px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;z-index:200;opacity:0;transform:translateY(10px);transition:all .3s ease;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tense-tooltip.visible{opacity:1;transform:translateY(0)}
.tense-tooltip .tt-name{font-family:'DM Serif Display',serif;font-size:1.15rem;margin-bottom:.15rem}
.tense-tooltip .tt-spanish{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-muted);margin-bottom:.6rem}
.tense-tooltip .tt-desc{font-size:.88rem;color:var(--text-dim);line-height:1.5;margin-bottom:.6rem}
.tense-tooltip .tt-example{font-size:.85rem;padding:.5rem .7rem;background:var(--surface);border-radius:var(--radius-sm);border-left:3px solid var(--accent)}
.tense-tooltip .tt-example .ex-es{color:var(--accent);font-weight:600}
.tense-tooltip .tt-example .ex-en{color:var(--text-muted);font-style:italic;font-size:.82rem}
.streak-display{position:fixed;top:1rem;right:1rem;background:var(--bg-card);border:1px solid var(--border);padding:.5rem 1rem;border-radius:var(--radius-sm);font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--accent);opacity:0;transform:translateY(-10px);transition:all .3s;z-index:100}
.streak-display.visible{opacity:1;transform:translateY(0)}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){header h1{font-size:2rem}.choices{grid-template-columns:1fr}.card-sentence{font-size:1.3rem}main{padding:1rem}.conj-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Verbos <span>español</span></h1>
    <p>Master Spanish verb conjugations through practice — 75+ verbs across 6 tenses</p>
  </header>
  <div class="stats-bar">
    <div class="stat"><div class="stat-value" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
    <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Attempted</div></div>
    <div class="stat"><div class="stat-value" id="stat-pct">0%</div><div class="stat-label">Accuracy</div></div>
    <div class="stat"><div class="stat-value" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
  </div>
  <main>
    <div class="practice-view active" id="practice-view">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="flashcard" id="flashcard">
        <div class="card-tense" id="card-tense">Present</div>
        <div class="card-pronoun" id="card-pronoun">yo</div>
        <div class="card-sentence" id="card-sentence">Loading...</div>
        <div class="card-english" id="card-english"></div>
        <div class="card-infinitive" id="card-infinitive"></div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"><div id="feedback-text"></div><div class="explanation" id="feedback-explanation"></div></div>
      <button class="next-btn" id="next-btn" onclick="nextCard()">Next Question →</button>
    </div>
    <div class="reference-view" id="reference-view">
      <input type="text" class="search-box" placeholder="Search verbs (Spanish or English)..." id="verb-search" oninput="filterVerbs()">
      <div class="verb-count" id="verb-count"></div>
      <div class="table-scroll">
        <table class="verb-table"><thead><tr><th>Spanish</th><th>English</th><th>Group</th><th>Type</th></tr></thead><tbody id="verb-tbody"></tbody></table>
      </div>
    </div>
    <div class="conjugation-view" id="conjugation-view">
      <div style="margin-bottom:1rem"><button class="conj-back-btn" onclick="switchView('reference')">← Back to list</button></div>
      <div class="conj-header"><h2 id="conj-verb"></h2><span class="meaning" id="conj-meaning"></span></div>
      <div class="conj-grid" id="conj-grid"></div>
    </div>
    <div class="results-screen" id="results-screen">
      <div class="results-score" id="results-score">0%</div>
      <div class="results-label">Session Accuracy</div>
      <div class="results-details">
        <div><div class="rd-num green" id="res-correct">0</div><div class="rd-label">Correct</div></div>
        <div><div class="rd-num red" id="res-incorrect">0</div><div class="rd-label">Incorrect</div></div>
      </div>
      <button class="restart-btn" onclick="restartSession()">Practice Again</button>
    </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('practice')">Practice</button>
    <button class="nav-tab" onclick="switchView('reference')">Verb Reference</button>
  </nav><br/><br/>
      <div class="settings-panel">
        <h3>Configure Practice</h3>
        <div class="setting-group"><label>Tenses</label><div class="chip-row" id="tense-chips"></div></div>
        <div class="setting-group"><label>Verb Types</label><div class="chip-row" id="type-chips"></div></div>
      </div>
  </main>
</div>
<div class="tense-tooltip" id="tense-tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-spanish" id="tt-spanish"></div>
  <div class="tt-desc" id="tt-desc"></div>
  <div class="tt-example"><span class="ex-es" id="tt-ex-es"></span><br><span class="ex-en" id="tt-ex-en"></span></div>
</div>
<div class="streak-display" id="streak-display"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// COMPREHENSIVE SPANISH VERB DATABASE — 75+ verbs, 6 tenses each
// ═══════════════════════════════════════════════════════════════
const P=['yo','tú','él/ella/Ud.','nosotros','vosotros','ellos/ellas/Uds.'];
const TENSES=['present','preterite','imperfect','future','conditional','subjunctive'];
const TL={present:'Present',preterite:'Preterite',imperfect:'Imperfect',future:'Future',conditional:'Conditional',subjunctive:'Subjunctive'};

// ═══════════════════════════════════════════════════════════════
// TENSE DESCRIPTIONS (for hover tooltips)
// ═══════════════════════════════════════════════════════════════
const TENSE_INFO={
  present:{
    name:'Present (Presente)',spanish:'Presente de indicativo',
    desc:'Describes actions happening now, habitual actions, or general truths. The most common tense in everyday conversation.',
    exEs:'Yo hablo español.',exEn:'I speak Spanish.'},
  preterite:{
    name:'Preterite (Pretérito)',spanish:'Pretérito indefinido',
    desc:'Describes completed actions in the past with a clear beginning and end. Used for specific events, sequences, and actions done a set number of times.',
    exEs:'Ayer comí una pizza.',exEn:'Yesterday I ate a pizza.'},
  imperfect:{
    name:'Imperfect (Imperfecto)',spanish:'Pretérito imperfecto',
    desc:'Describes ongoing, habitual, or repeated past actions without a defined endpoint. Used for background descriptions, age, time, weather, and "used to" situations.',
    exEs:'Cuando era niño, jugaba mucho.',exEn:'When I was a child, I used to play a lot.'},
  future:{
    name:'Future (Futuro)',spanish:'Futuro simple',
    desc:'Describes actions that will happen in the future. Also used for probability or conjecture about the present ("I wonder if...").',
    exEs:'Mañana estudiaré más.',exEn:'Tomorrow I will study more.'},
  conditional:{
    name:'Conditional (Condicional)',spanish:'Condicional simple',
    desc:'Describes hypothetical actions — what would happen under certain conditions. Used for polite requests, wishes, and "would" scenarios.',
    exEs:'Yo comería más, pero estoy lleno.',exEn:'I would eat more, but I\'m full.'},
  subjunctive:{
    name:'Present Subjunctive (Subjuntivo)',spanish:'Presente de subjuntivo',
    desc:'Expresses doubt, wishes, emotions, recommendations, or hypothetical situations. Triggered by phrases like "I hope that...", "I want you to...", "It\'s important that...".',
    exEs:'Espero que tú hables con ella.',exEn:'I hope that you speak with her.'},
};

// ═══════════════════════════════════════════════════════════════
// ENGLISH VERB CONJUGATION ENGINE
// Per-verb English forms for each tense × pronoun(I/You/He/We/YouAll/They)
// ═══════════════════════════════════════════════════════════════
// Format: {base, thirdPerson, past, pastPart, imperfect, gerund}
// We build tense-appropriate English from these stems
function enConj(base, third, past, imp) {
  // imp = special imperfect phrasing if needed (e.g. "used to speak")
  const impBase = imp || ('used to ' + base);
  return {
    // [I, You, He/She, We, You all, They]
    present: [base, base, third, base, base, base],
    preterite: [past, past, past, past, past, past],
    imperfect: [impBase, impBase, impBase, impBase, impBase, impBase],
    future: ['will '+base, 'will '+base, 'will '+base, 'will '+base, 'will '+base, 'will '+base],
    conditional: ['would '+base, 'would '+base, 'would '+base, 'would '+base, 'would '+base, 'would '+base],
    subjunctive: [base, base, base, base, base, base], // English subjunctive uses base form
  };
}
const EN_VERBS = {
  'hablar': enConj('speak','speaks','spoke'),
  'trabajar': enConj('work','works','worked'),
  'estudiar': enConj('study','studies','studied'),
  'llamar': enConj('call','calls','called'),
  'llevar': enConj('wear','wears','wore'),
  'necesitar': enConj('need','needs','needed'),
  'comprar': enConj('buy','buys','bought'),
  'tomar': enConj('take','takes','took'),
  'caminar': enConj('walk','walks','walked'),
  'esperar': enConj('wait','waits','waited'),
  'mirar': enConj('watch','watches','watched'),
  'ayudar': enConj('help','helps','helped'),
  'preguntar': enConj('ask','asks','asked'),
  'cocinar': enConj('cook','cooks','cooked'),
  'bailar': enConj('dance','dances','danced'),
  'cantar': enConj('sing','sings','sang'),
  'viajar': enConj('travel','travels','traveled'),
  'ganar': enConj('win','wins','won'),
  'descansar': enConj('rest','rests','rested'),
  'nadar': enConj('swim','swims','swam'),
  'enseñar': enConj('teach','teaches','taught'),
  'lavar': enConj('wash','washes','washed'),
  'preparar': enConj('prepare','prepares','prepared'),
  'contestar': enConj('answer','answers','answered'),
  'limpiar': enConj('clean','cleans','cleaned'),
  'pintar': enConj('paint','paints','painted'),
  'dibujar': enConj('draw','draws','drew'),
  'comer': enConj('eat','eats','ate'),
  'beber': enConj('drink','drinks','drank'),
  'correr': enConj('run','runs','ran'),
  'aprender': enConj('learn','learns','learned'),
  'comprender': enConj('understand','understands','understood'),
  'vender': enConj('sell','sells','sold'),
  'deber': enConj('must','must','had to','used to have to'),
  'responder': enConj('respond','responds','responded'),
  'prometer': enConj('promise','promises','promised'),
  'meter': enConj('put','puts','put'),
  'barrer': enConj('sweep','sweeps','swept'),
  'vivir': enConj('live','lives','lived'),
  'escribir': enConj('write','writes','wrote'),

function getEnglishVerb(inf, tense, pronounIdx) {

  if (!forms) return '___';

}

// ═══════════════════════════════════════════════════════════════
// GAME STATE & ENGINE
// ═══════════════════════════════════════════════════════════════
let state = {
  activeTenses: ['present'],
  activeTypes: ['regular','irregular'],
  correct: 0, total: 0, streak: 0, bestStreak: 0,
  currentQuestion: null, answered: false,
  sessionLength: 20, sessionIndex: 0,
};

const PE = ['I','You','He/She','We','You all','They'];

function init() {
  renderChips();
  generateQuestion();
  updateStats();
}

function renderChips() {
  document.getElementById('tense-chips').innerHTML = TENSES.map(t =>
    `<button class="chip ${state.activeTenses.includes(t)?'active':''}" onmouseenter="showTenseTooltip('${t}')" onmouseleave="hideTenseTooltip()" onclick="toggleTense('${t}',this)">${TL[t]}</button>`
  ).join('');
  document.getElementById('type-chips').innerHTML = ['regular','irregular'].map(t =>
    `<button class="chip ${state.activeTypes.includes(t)?'active':''}" onclick="toggleType('${t}',this)">${t[0].toUpperCase()+t.slice(1)}</button>`
  ).join('');
}

function toggleTense(t,el){
  const i=state.activeTenses.indexOf(t);
  if(i>=0&&state.activeTenses.length>1){state.activeTenses.splice(i,1);el.classList.remove('active')}
  else if(i<0){state.activeTenses.push(t);el.classList.add('active')}
  if(!state.answered)generateQuestion();
}
function toggleType(t,el){
  const i=state.activeTypes.indexOf(t);
  if(i>=0&&state.activeTypes.length>1){state.activeTypes.splice(i,1);el.classList.remove('active')}
  else if(i<0){state.activeTypes.push(t);el.classList.add('active')}
  if(!state.answered)generateQuestion();
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function getFiltered(){
  return VERBS.filter(v=>(state.activeTypes.includes('regular')&&!v.irr)||(state.activeTypes.includes('irregular')&&v.irr));
}

function generateQuestion(){
  const verbs=getFiltered();
  if(!verbs.length)return;
  const verb=verbs[Math.floor(Math.random()*verbs.length)];
  const tense=state.activeTenses[Math.floor(Math.random()*state.activeTenses.length)];
  const pi=Math.floor(Math.random()*6);
  const correct=verb.conj[tense][pi];

  // Generate 4 unique choices including the correct one
  const opts=new Set([correct]);
  // Same verb, other pronouns
  for(const i of shuffle([0,1,2,3,4,5].filter(i=>i!==pi))){if(opts.size>=4)break;opts.add(verb.conj[tense][i])}
  // Same verb, other tenses
  for(const t of shuffle(TENSES.filter(t2=>t2!==tense))){if(opts.size>=4)break;opts.add(verb.conj[t][pi])}
  // Other verbs same tense/pronoun
  const sg=VERBS.filter(v=>v.group===verb.group&&v.inf!==verb.inf);
  for(const v of shuffle(sg)){if(opts.size>=4)break;opts.add(v.conj[tense][pi])}
  while(opts.size<4){const rv=VERBS[Math.floor(Math.random()*VERBS.length)];opts.add(rv.conj[tense][Math.floor(Math.random()*6)])}

  const sent=(verb.sent||'{p} ___ ...').replace('{p}','');
  const enVerb=getEnglishVerb(verb.inf, tense, pi);
  const senEn=(verb.senEn||'{pe} ___ ...').replace('{pe}',PE[pi]).replace('___',enVerb);

  state.currentQuestion={verb,tense,pi,correct,choices:shuffle([...opts].slice(0,4)),sent,senEn};
  state.answered=false;
  renderCard();
}

function renderCard(){
  const q=state.currentQuestion;if(!q)return;
  const card=document.getElementById('flashcard');
  card.className='flashcard';card.style.animation='none';card.offsetHeight;card.style.animation='';
  document.getElementById('card-tense').textContent=TL[q.tense];
  document.getElementById('card-tense').style.color=`var(--t-${q.tense})`;
  document.getElementById('card-pronoun').textContent=P[q.pi];
  document.getElementById('card-sentence').innerHTML=q.sent.replace('___','<span class="blank">?</span>');
  document.getElementById('card-english').textContent=q.senEn;
  document.getElementById('card-infinitive').textContent=`${q.verb.inf} — ${q.verb.en}`;
  document.getElementById('choices').innerHTML=q.choices.map((c,i)=>
    `<button class="choice-btn" onclick="selectAnswer(${i})"><span class="key-hint">${i+1}</span>${c}</button>`
  ).join('');
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  document.getElementById('progress-fill').style.width=(state.sessionIndex/state.sessionLength*100)+'%';
}

function selectAnswer(idx){
  if(state.answered)return;
  state.answered=true;state.total++;state.sessionIndex++;
  const q=state.currentQuestion;
  const sel=q.choices[idx];
  const ok=sel===q.correct;
  const card=document.getElementById('flashcard');
  const btns=document.querySelectorAll('.choice-btn');
  const fb=document.getElementById('feedback');

  btns.forEach((b,i)=>{
    b.disabled=true;
    if(q.choices[i]===q.correct)b.classList.add('correct-choice');
    else if(i===idx&&!ok)b.classList.add('incorrect-choice');
  });

  const blank=document.querySelector('.blank');
  if(blank){blank.textContent=q.correct;blank.style.borderBottom='none'}

  if(ok){
    state.correct++;state.streak++;
    if(state.streak>state.bestStreak)state.bestStreak=state.streak;
    card.classList.add('correct');
    fb.className='feedback correct-fb show';
    document.getElementById('feedback-text').textContent='✓ Correct!';
    document.getElementById('feedback-explanation').textContent=`${P[q.pi]} → ${q.correct} (${TL[q.tense]})`;
    if(state.streak>=3){
      const s=document.getElementById('streak-display');
      s.textContent=`🔥 ${state.streak} streak!`;s.classList.add('visible');
      setTimeout(()=>s.classList.remove('visible'),2000);
    }
  }else{
    state.streak=0;card.classList.add('incorrect');
    fb.className='feedback incorrect-fb show';
    document.getElementById('feedback-text').textContent=`✗ The correct answer is: ${q.correct}`;
    document.getElementById('feedback-explanation').textContent=`${P[q.pi]} → ${q.correct} (${TL[q.tense]} of ${q.verb.inf})`;
  }
  document.getElementById('next-btn').className='next-btn show';
  updateStats();
}

function nextCard(){
  if(state.sessionIndex>=state.sessionLength){showResults();return}
  generateQuestion();
}

function showResults(){
  document.getElementById('practice-view').classList.remove('active');
  document.getElementById('results-screen').classList.add('active');
  const pct=state.total>0?Math.round(state.correct/state.total*100):0;
  document.getElementById('results-score').textContent=pct+'%';
  document.getElementById('res-correct').textContent=state.correct;
  document.getElementById('res-incorrect').textContent=state.total-state.correct;
}

function restartSession(){
  state.correct=0;state.total=0;state.streak=0;state.sessionIndex=0;
  document.getElementById('results-screen').classList.remove('active');
  document.getElementById('practice-view').classList.add('active');
  updateStats();generateQuestion();
}

function updateStats(){
  document.getElementById('stat-correct').textContent=state.correct;
  document.getElementById('stat-total').textContent=state.total;
  document.getElementById('stat-pct').textContent=(state.total>0?Math.round(state.correct/state.total*100):0)+'%';
  document.getElementById('stat-streak').textContent=state.streak;
}

// ═══════════════════════════════════════════════════════════════
// VIEW SWITCHING & REFERENCE
// ═══════════════════════════════════════════════════════════════
function switchView(v){
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['practice','reference','conjugation'][i]===v));
  document.getElementById('practice-view').classList.toggle('active',v==='practice');
  document.getElementById('reference-view').classList.toggle('active',v==='reference');
  document.getElementById('conjugation-view').classList.toggle('active',v==='conjugation');
  document.getElementById('results-screen').classList.remove('active');
  if(v==='reference')renderVerbTable();
}

function renderVerbTable(f=''){
  const fl=VERBS.filter(v=>v.inf.includes(f.toLowerCase())||v.en.includes(f.toLowerCase()));
  document.getElementById('verb-tbody').innerHTML=fl.map(v=>`
    <tr onclick="showConjugation('${v.inf}')" style="cursor:pointer">
      <td class="verb-es">${v.inf}</td><td class="verb-en">${v.en}</td>
      <td>-${v.group}</td><td><span class="verb-type ${v.irr?'irregular':''}">${v.irr?'irregular':'regular'}</span></td>
    </tr>`).join('');
  document.getElementById('verb-count').textContent=`${fl.length} of ${VERBS.length} verbs`;
}
function filterVerbs(){renderVerbTable(document.getElementById('verb-search').value)}

function showConjugation(inf){
  const v=VERBS.find(x=>x.inf===inf);if(!v)return;
  switchView('conjugation');
  document.getElementById('conj-verb').textContent=v.inf;
  document.getElementById('conj-meaning').textContent=v.en;
  document.getElementById('conj-grid').innerHTML=TENSES.map(t=>{
    const forms=v.conj[t];
    return `<div class="conj-card"><h4 style="color:var(--t-${t})">${TL[t]}</h4>
      ${P.map((p,i)=>`<div class="conj-row"><span class="pronoun">${p}</span><span class="form">${forms[i]}</span></div>`).join('')}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// TENSE TOOLTIP HOVER
// ═══════════════════════════════════════════════════════════════
let tooltipTimeout = null;
function showTenseTooltip(tense) {
  const info = TENSE_INFO[tense];
  if (!info) return;
  const tt = document.getElementById('tense-tooltip');
  document.getElementById('tt-name').textContent = info.name;
  document.getElementById('tt-name').style.color = `var(--t-${tense})`;
  document.getElementById('tt-spanish').textContent = info.spanish;
  document.getElementById('tt-desc').textContent = info.desc;
  document.getElementById('tt-ex-es').textContent = info.exEs;
  document.getElementById('tt-ex-en').textContent = info.exEn;
  clearTimeout(tooltipTimeout);
  tt.classList.add('visible');
}
function hideTenseTooltip() {
  tooltipTimeout = setTimeout(() => {
    document.getElementById('tense-tooltip').classList.remove('visible');
  }, 200);
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;const b=document.querySelectorAll('.choice-btn');if(b[i]&&!state.answered)selectAnswer(i)}
  if((e.key==='Enter'||e.key===' ')&&state.answered){e.preventDefault();nextCard()}
});

init();
</script>

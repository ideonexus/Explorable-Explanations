  "Balaenoptera":       { rank:"Genus", desc:"Rorqual whales — including B. musculus (blue whale), the largest animal ever known to have lived on Earth at up to 33 metres." },
  "Tursiops":           { rank:"Genus", desc:"Bottlenose dolphins — among the most intelligent non-human animals. They use signature whistles as individual names." },
  "Dasypus":            { rank:"Genus", desc:"Long-nosed armadillos, including the nine-banded armadillo — the only mammal known to naturally contract leprosy." },
  "Didelphis":          { rank:"Genus", desc:"Large American opossums including D. virginiana. Their immune systems neutralize many snake venoms that would kill other mammals." },
  "Osphranter":         { rank:"Genus", desc:"Red and antilopine kangaroos — the largest genus of kangaroos. Red kangaroos can reach 90 km/h in short bursts." },
  "Ornithorhynchus":    { rank:"Genus", desc:"The platypus — the sole living species. Males carry ankle spurs that deliver venom causing intense pain in large animals." },

};

//  STATE
// ====================================================
let state = {};
let highScore = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ====================================================
//  START
// ====================================================
function startGame() {
  state = {
    lives: MAX_LIVES,
    score: 0,
    speciesCount: 0,
    roundHistory: [],
    usedSpecies: [],
    currentSpecies: null,
    currentRankIdx: 0,
    wrongThisRank: 0,
    answeredRanks: {},
    eliminatedThisRank: []   // wrong choices eliminated this rank
  };
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('game-area').style.display = 'block';
  document.getElementById('feedback').className = 'feedback';
  // Clear field log for new game
  document.getElementById('field-log').innerHTML = '';
  document.getElementById('field-log-wrap').classList.remove('show');
  renderLives();
  updateHUD();
  nextSpecies();
}

// ====================================================
//  LIVES
// ====================================================
function renderLives() {
  const wrap = document.getElementById('lives-wrap');
  wrap.innerHTML = '';
  for (let i = 0; i < MAX_LIVES; i++) {
    const pip = document.createElement('div');
    pip.className = 'life-pip' + (i >= state.lives ? ' lost' : '');
    wrap.appendChild(pip);
  }
}

function loseLife() {
  state.lives--;
  renderLives();
  const wrap = document.getElementById('lives-wrap');
  wrap.classList.remove('shake');
  void wrap.offsetWidth;
  wrap.classList.add('shake');
}

// ====================================================
//  SPECIES SETUP
// ====================================================
function nextSpecies() {
  // Recycle if we've used all species
  if (state.usedSpecies.length >= SPECIES_DB.length) state.usedSpecies = [];
  const pool = SPECIES_DB.filter(s => !state.usedSpecies.includes(s.scientific));
  const target = pool[Math.floor(Math.random() * pool.length)];
  state.usedSpecies.push(target.scientific);
  state.speciesCount++;
  state.currentSpecies = target;
  state.currentRankIdx = 0;
  state.wrongThisRank  = 0;
  state.answeredRanks  = {};
  state.eliminatedThisRank = [];

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('species-complete-panel').classList.remove('show');
  document.getElementById('options-grid').style.display = '';
  document.querySelector('.rank-section').style.visibility = '';
  revealTarget(false);
  updateHUD();
  updateBreadcrumb();
  renderRank();
}

// ====================================================
//  HUD
// ====================================================
function updateHUD() {
  document.getElementById('round-num').textContent = state.speciesCount;
  document.getElementById('score-num').textContent = state.score;
  document.getElementById('hi-num').textContent    = highScore;
}

// ====================================================
//  TARGET CARD
// ====================================================
function revealTarget(showScientific) {
  const el = document.getElementById('target-sci');
  if (showScientific) {
    el.textContent = state.currentSpecies.scientific;
    el.className   = 'target-name';
  } else {
    el.textContent = '· · · · · · · · · · · ·';
    el.className   = 'target-name hidden-sci';
  }
  document.getElementById('target-common').textContent = state.currentSpecies.common;
  document.getElementById('target-hint').textContent   = state.currentSpecies.hint;
}

// ====================================================
//  BREADCRUMB  (with tooltips)
// ====================================================
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  RANKS.forEach((r, i) => {
    if (!state.answeredRanks[r]) return;
    const val  = state.answeredRanks[r];
    const info = TAXON_INFO[val];
    const tip  = info
      ? `<div class="tooltip-box"><em>${info.rank}</em><strong>${val}</strong>${info.desc}</div>`
      : '';
    bc.innerHTML += `<div class="crumb">${tip}<span class="crumb-rank">${RANK_NAMES[i]}:</span>${val}</div>`;
  });
}

// ====================================================
//  RENDER RANK QUESTION
// ====================================================
function renderRank() {
  const rankIdx  = state.currentRankIdx;
  const rank     = RANKS[rankIdx];
  const rankName = RANK_NAMES[rankIdx];
  const correct  = state.currentSpecies[rank];

  document.getElementById('rank-label').textContent    = `Step ${rankIdx + 1} of ${RANKS.length} — ${rankName}`;
  document.getElementById('rank-question').textContent = `Select the correct ${rankName}:`;

  // Build 4 options (correct + 3 random distractors, excluding already-eliminated wrong choices)
  const pool = DISTRACTORS[rank].filter(d => d !== correct && !state.eliminatedThisRank.includes(d));
  shuffle(pool);
  const options = shuffle([correct, ...pool.slice(0, 3)]);

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className    = 'option-btn';
    btn.textContent  = opt;
    btn.dataset.value = opt;
    if (state.eliminatedThisRank.includes(opt)) {
      btn.classList.add('wrong');
    } else {
      btn.addEventListener('click', () => selectOption(btn, opt, correct, rank));
    }
    grid.appendChild(btn);
  });
}

// ====================================================
//  ANSWER HANDLER
// ====================================================
function selectOption(btn, chosen, correct, rank) {
  const fb = document.getElementById('feedback');

  if (chosen === correct) {
    // ── CORRECT ──
    // Lock all buttons immediately
    document.querySelectorAll('.option-btn').forEach(b => {
      b.classList.add('disabled');
      b.replaceWith(b.cloneNode(true)); // remove event listeners
    });
    // Re-find the clicked button by value and mark correct
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.dataset.value === correct) b.classList.add('correct');
    });

    state.answeredRanks[rank] = chosen;
    state.score += 1;
    state.wrongThisRank       = 0;
    state.eliminatedThisRank  = [];

    fb.className  = 'feedback correct';
    fb.textContent = `✓ Correct! +1 point.`;

    updateHUD();
    updateBreadcrumb();

    const isLastRank = state.currentRankIdx >= RANKS.length - 1;

    if (!isLastRank) {
      setTimeout(() => {
        state.currentRankIdx++;
        fb.className = 'feedback';
        renderRank();
      }, 1300);
    } else {
      // Species fully identified — show review panel
      revealTarget(true);
      state.roundHistory.push({ species: state.currentSpecies, success: true });

      // Hide options/rank section, show complete panel
      document.getElementById('options-grid').style.display = 'none';
      document.getElementById('feedback').className = 'feedback';
      showSpeciesCompletePanel();
    }

  } else {
    // ── WRONG ──
    btn.classList.add('wrong');
    // Remove this button's listener (mark it permanently wrong)
    const fresh = btn.cloneNode(true);
    btn.replaceWith(fresh);

    state.eliminatedThisRank.push(chosen);
    state.wrongThisRank++;

    loseLife();

    fb.className  = 'feedback wrong';
    fb.textContent = `✗ Not this one. ${state.lives} life${state.lives !== 1 ? 's' : ''} remaining.`;

    updateHUD();

    if (state.lives <= 0) {
      // Game over
      revealTarget(true);
      // Show the correct answer
      document.querySelectorAll('.option-btn').forEach(b => {
        b.classList.add('disabled');
        const clone = b.cloneNode(true);
        if (clone.dataset.value === correct) clone.classList.add('correct');
        b.replaceWith(clone);
      });
      fb.className = 'feedback reveal';
      fb.innerHTML = `Game over! The correct <em>${RANK_NAMES[state.currentRankIdx]}</em> was <strong>${correct}</strong>. The species was <em>${state.currentSpecies.scientific}</em>.`;
      state.roundHistory.push({ species: state.currentSpecies, success: false });
      document.getElementById('species-complete-panel').classList.remove('show');
      setTimeout(showResults, 3200);
    }
  }
}

// ====================================================
//  SPECIES COMPLETE PANEL
// ====================================================
function showSpeciesCompletePanel() {
  const sp = state.currentSpecies;
  document.getElementById('complete-sci-name').textContent = sp.scientific + ' — ' + sp.common;

  // Build chain review with tooltips
  const chainEl = document.getElementById('chain-review');
  chainEl.innerHTML = '';
  RANKS.forEach((r, i) => {
    const val  = sp[r];
    const info = TAXON_INFO[val];
    const tip  = info
      ? `<div class="tooltip-box"><em>${info.rank}</em><strong>${val}</strong>${info.desc}</div>`
      : '';
    chainEl.innerHTML += `
      <div class="chain-step">
        <span class="chain-rank-label">${RANK_NAMES[i]}</span>
        <span class="chain-value">${tip}${val}</span>
      </div>`;
  });

  document.getElementById('species-complete-panel').classList.add('show');
  // Hide the rank question area while reviewing
  document.querySelector('.rank-section').style.visibility = 'hidden';
}

function proceedNextSpecies() {
  // Add the just-completed species to the field log
  addToFieldLog(state.currentSpecies, state.roundHistory.length);

  // Reset hidden/visibility states
  document.getElementById('options-grid').style.display = '';
  document.querySelector('.rank-section').style.visibility = '';
  document.getElementById('species-complete-panel').classList.remove('show');

  if (state.lives > 0) nextSpecies();
  else showResults();
}

// ====================================================
//  FIELD LOG
// ====================================================
function addToFieldLog(sp, num) {
  const wrap = document.getElementById('field-log-wrap');
  const log  = document.getElementById('field-log');
  wrap.classList.add('show');

  // Build chip chain with tooltips
  const chips = RANKS.map((r, i) => {
    const val  = sp[r];
    const info = TAXON_INFO[val];
    const tip  = info
      ? `<div class="tooltip-box"><em>${info.rank}</em><strong>${val}</strong>${info.desc}</div>`
      : '';
    return `<div class="fle-chip">
      <span class="fle-chip-rank">${RANK_NAMES[i]}</span>
      <span class="fle-chip-val">${tip}${val}</span>
    </div>`;
  }).join('');

  const entry = document.createElement('div');
  entry.className = 'field-log-entry';
  entry.innerHTML = `
    <div class="fle-top">
      <span class="fle-num">#${num}</span>
      <span class="fle-sci">${sp.scientific}</span>
      <span class="fle-common">${sp.common}</span>
    </div>
    <div class="fle-chain">${chips}</div>`;

  // Prepend so newest is on top
  log.insertBefore(entry, log.firstChild);
}

// ====================================================
//  RESULTS SCREEN
// ====================================================
function showResults() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('results-screen').classList.add('show');

  const isNew = state.score > highScore;
  if (isNew) highScore = state.score;

  document.getElementById('final-score').textContent = state.score;
  document.getElementById('final-best').textContent  = highScore;
  document.getElementById('new-record-msg').innerHTML = isNew
    ? '<div class="new-record">🏅 New Personal Best!</div>' : '';

  const s = state.score;
  document.getElementById('final-grade').textContent =
    s >= 100 ? "Master Naturalist — Extraordinary classification acumen." :
    s >= 60  ? "Field Biologist — A commendable depth of taxonomic knowledge." :
    s >= 30  ? "Apprentice Naturalist — A promising start to your studies." :
               "Novice — The natural world awaits your deeper study.";

  const summary = document.getElementById('results-summary');
  summary.innerHTML = '<div style="font-size:0.8rem;letter-spacing:0.15em;color:var(--brown-light);margin-bottom:10px;text-transform:uppercase;">Species Encountered</div>';
  state.roundHistory.forEach(r => {
    summary.innerHTML += `<div class="result-row">
      <span style="font-size:1rem">${r.success ? '✓' : '✗'}</span>
      <span class="result-species">${r.species.scientific}</span>
      <span style="color:var(--brown-mid);font-size:0.85rem;">${r.species.common}</span>
    </div>`;
  });

  updateHUD();
}

// ====================================================
//  BOOT
// ====================================================
startGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1e1e3a;
    --accent: #6366f1;
    --accent2: #a78bfa;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: rgba(99,102,241,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* SIDEBAR */
  aside {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* GEAR SELECTOR */
  .gear-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .gear-param label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 4px;
  }

  .gear-param .val-display {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    color: var(--accent2);
    float: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    margin-top: 4px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--glow);
    cursor: pointer;
  }

  /* COLOR PALETTE */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }

  .color-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }

  .color-swatch.active {
    border-color: white;
    transform: scale(1.15);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
  }

  .color-swatch:hover { transform: scale(1.1); }

  .custom-color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }

  .custom-color-row label {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  input[type="color"] {
    -webkit-appearance: none;
    width: 36px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  /* STROKE */
  .stroke-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* MULTI-COLOR TOGGLE */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
  }

  .toggle input { display: none; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-slider::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 3px;
    width: 16px;
    height: 16px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked + .toggle-slider { background: var(--accent); }
  .toggle input:checked + .toggle-slider::after { transform: translateX(18px); }

  /* SPEED */
  /* BUTTONS */
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  button {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    box-shadow: 0 0 20px rgba(79,70,229,0.4);
  }

  .btn-primary:hover {
    box-shadow: 0 0 30px rgba(79,70,229,0.6);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent2);
  }

  .btn-danger {
    background: transparent;
    color: #f87171;
    border: 1px solid rgba(248,113,113,0.3);
  }

  .btn-danger:hover {
    background: rgba(248,113,113,0.1);
    border-color: #f87171;
  }

  /* STATUS */
  .status-bar {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    font-family: 'Orbitron', monospace;
    letter-spacing: 0.1em;
    padding: 4px;
    min-height: 24px;
  }

  .status-bar.running { color: #34d399; }
  .status-bar.done { color: var(--accent2); }

  /* CANVAS AREA */
  .canvas-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0d0d1f 0%, #0a0a0f 70%);
    position: relative;
    overflow: hidden;
    padding: 16px;
    min-height: 0;
  }

  #main {
    display: block;
    /* Canvas is sized by JS to be a square fitting within the wrapper */
    background: #05050e;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(99,102,241,0.1);
  }

  /* Gear preview */
  .gear-preview {
    position: absolute;
    top: 16px;
    right: 16px;
    opacity: 0.6;
    pointer-events: none;
  }

  #preview {
    display: block;
    width: 100px;
    height: 100px;
    border: none !important;
    box-shadow: none !important;
    background: transparent !important;
  }

  /* Presets */
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .preset-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 7px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: none;
  }

  .preset-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(99,102,241,0.05);
  }

  @media (max-width: 700px) {
    main { flex-direction: column; }
    aside {
      width: 100%;
      min-width: unset;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 12px;
      gap: 12px;
      overflow-y: visible;
      overflow-x: auto;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .section { min-width: 200px; }
  }
</style>
</head>
<body>

<main>
  <aside>
    <!-- GEAR PARAMS -->
    <div class="section">
      <div class="section-title">Gear Parameters</div>
      <div style="display:flex;flex-direction:column;gap:14px;">

        <div class="gear-param">
          <label>Outer Radius <span class="val-display" id="R-val">120</span></label>
          <input type="range" id="R" min="60" max="180" value="120" step="1">
        </div>

        <div class="gear-param">
          <label>Inner Radius <span class="val-display" id="r-val">47</span></label>
          <input type="range" id="r" min="5" max="175" value="47" step="1">
        </div>

        <div class="gear-param">
          <label>Pen Offset <span class="val-display" id="d-val">60</span></label>
          <input type="range" id="d" min="1" max="180" value="60" step="1">
        </div>

        <div class="gear-param">
          <label>Draw Speed <span class="val-display" id="speed-val">4</span></label>
          <input type="range" id="speed" min="1" max="16" value="4" step="1">
        </div>
      </div>
    </div>

    <!-- COLOR -->
    <div class="section">
      <div class="section-title">Ink Color</div>
      <div class="color-grid" id="colorGrid"></div>
      <div class="custom-color-row">
        <label>Custom</label>
        <input type="color" id="customColor" value="#6366f1">
      </div>
      <div style="margin-top:10px;">
        <div class="toggle-row">
          <span>Rainbow Shift</span>
          <label class="toggle">
            <input type="checkbox" id="rainbowToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- STROKE -->
    <div class="section">
      <div class="section-title">Stroke</div>
      <div class="gear-param">
        <label>Width <span class="val-display" id="stroke-val">1.5</span></label>
        <input type="range" id="strokeWidth" min="0.5" max="6" value="1.5" step="0.5">
      </div>
      <div style="margin-top:10px;">
        <div class="toggle-row">
          <span>Glow Effect</span>
          <label class="toggle">
            <input type="checkbox" id="glowToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- PRESETS -->
    <div class="section">
      <div class="section-title">Presets</div>
      <div class="preset-grid" id="presetGrid"></div>
    </div>

    <!-- BUTTONS -->
    <div class="section">
      <div class="section-title">Controls</div>
      <div class="btn-group">
        <button class="btn-primary" id="startBtn">▶ Draw</button>
        <button class="btn-danger" id="clearBtn">✕ Clear Canvas</button>
        <button class="btn-secondary" id="pauseBtn">⏸ Pause</button>
        <button class="btn-secondary" id="saveBtn">⬇ Save PNG</button>
      </div>
      <div class="status-bar" id="statusBar">READY</div>
    </div>
  </aside>

  <div class="canvas-wrapper">
    <canvas id="main"></canvas>
    <div class="gear-preview">
      <canvas id="preview" width="100" height="100"></canvas>
    </div>
  </div>
</main>

<script>
// ─── PALETTE ───────────────────────────────────────────────────────────────
const PALETTE = [
  '#f43f5e','#fb923c','#facc15','#4ade80','#22d3ee','#6366f1',
  '#a78bfa','#f472b6','#ffffff','#94a3b8','#14b8a6','#f97316'
];

const PRESETS = [
  { name: 'Rose', R:120, r:47, d:60 },
  { name: 'Star', R:130, r:26, d:120 },
  { name: 'Spiral', R:150, r:73, d:85 },
  { name: 'Petals', R:120, r:40, d:40 },
  { name: 'Orbit', R:100, r:61, d:100 },
  { name: 'Web', R:140, r:35, d:140 },
  { name: 'Ellipse', R:120, r:90, d:50 },
  { name: 'Complex', R:155, r:67, d:110 },
];

// ─── STATE ─────────────────────────────────────────────────────────────────
let animId = null;
let t = 0;
let selectedColor = '#6366f1';
let drawing = false;

// ─── ELEMENTS ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const previewCanvas = document.getElementById('preview');
const pctx = previewCanvas.getContext('2d');

// ─── SIZING ────────────────────────────────────────────────────────────────
// Canvas is a square that fits snugly inside the wrapper with padding
function resize() {
  const wrapper = canvas.parentElement;
  const availW = wrapper.clientWidth - 32;   // 16px padding each side
  const availH = wrapper.clientHeight - 32;
  const size = Math.floor(Math.min(availW, availH));
  if (canvas.width === size && canvas.height === size) return;

  // Preserve drawn content
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = canvas.height;
  offscreen.getContext('2d').drawImage(canvas, 0, 0);

  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';

  // Restore content centered
  const ox = (size - offscreen.width) / 2;
  const oy = (size - offscreen.height) / 2;
  ctx.drawImage(offscreen, ox, oy);
}

const ro = new ResizeObserver(() => resize());
ro.observe(canvas.parentElement);
resize();

// ─── PALETTE INIT ──────────────────────────────────────────────────────────
const colorGrid = document.getElementById('colorGrid');
PALETTE.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (i === 5 ? ' active' : '');
  sw.style.background = c;
  sw.title = c;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    selectedColor = c;
    document.getElementById('customColor').value = c;
  });
  colorGrid.appendChild(sw);
});

document.getElementById('customColor').addEventListener('input', e => {
  selectedColor = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// ─── PRESETS INIT ──────────────────────────────────────────────────────────
const presetGrid = document.getElementById('presetGrid');
PRESETS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'preset-btn';
  btn.textContent = p.name;
  btn.addEventListener('click', () => {
    document.getElementById('R').value = p.R;
    document.getElementById('r').value = p.r;
    document.getElementById('d').value = p.d;
    updateSliderDisplays();
    updatePreview();
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    drawing = false; t = 0;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    startDraw();
  });
  presetGrid.appendChild(btn);
});

// ─── SLIDER DISPLAYS ───────────────────────────────────────────────────────
function updateSliderDisplays() {
  ['R','r','d','speed','strokeWidth'].forEach(id => {
    const el = document.getElementById(id);
    const disp = document.getElementById(id + '-val');
    if (disp) disp.textContent = el.value;
  });
}
['R','r','d','speed','strokeWidth'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    updateSliderDisplays();
    updatePreview();
  });
});
updateSliderDisplays();

// ─── GEAR PREVIEW ──────────────────────────────────────────────────────────
function updatePreview() {
  const R = parseFloat(document.getElementById('R').value);
  const r = parseFloat(document.getElementById('r').value);
  const d = parseFloat(document.getElementById('d').value);
  const pw = previewCanvas.width;
  const ph = previewCanvas.height;
  const scale = 45 / Math.max(R, 1);

  pctx.clearRect(0,0,pw,ph);
  pctx.save();
  pctx.translate(pw/2, ph/2);
  pctx.scale(scale, scale);

  // Outer ring
  pctx.beginPath();
  pctx.arc(0,0,R,0,Math.PI*2);
  pctx.strokeStyle = 'rgba(99,102,241,0.4)';
  pctx.lineWidth = 2/scale;
  pctx.stroke();

  // Inner gear at current t
  const cx = (R - r) * Math.cos(t);
  const cy = (R - r) * Math.sin(t);
  pctx.beginPath();
  pctx.arc(cx, cy, r, 0, Math.PI*2);
  pctx.strokeStyle = 'rgba(167,139,250,0.5)';
  pctx.lineWidth = 2/scale;
  pctx.stroke();

  // Pen dot
  const angle2 = -((R - r) / r) * t;
  const px2 = cx + d * Math.cos(angle2);
  const py2 = cy + d * Math.sin(angle2);
  pctx.beginPath();
  pctx.arc(px2, py2, 3/scale, 0, Math.PI*2);
  pctx.fillStyle = selectedColor;
  pctx.fill();

  pctx.restore();
}
updatePreview();

// ─── DRAW LOGIC ────────────────────────────────────────────────────────────
function computeSteps(R, r) {
  function gcd(a,b) { return b===0?a:gcd(b,a%b); }
  const g = gcd(Math.round(R), Math.round(r));
  return Math.round(r/g) * 2 * Math.PI;
}

function hexToHsl(hex) {
  let r=0,g=0,b=0;
  if(hex.length===7) {
    r=parseInt(hex.slice(1,3),16)/255;
    g=parseInt(hex.slice(3,5),16)/255;
    b=parseInt(hex.slice(5,7),16)/255;
  }
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return [h*360,s*100,l*100];
}

function startDraw() {
  if (animId) cancelAnimationFrame(animId);
  t = 0;
  drawing = true;
  // Do NOT clear — new drawings overlay on top of existing ones
  // Use clearBtn to reset

  const R = parseFloat(document.getElementById('R').value);
  const r = parseFloat(document.getElementById('r').value);
  const d = parseFloat(document.getElementById('d').value);
  const speed = parseFloat(document.getElementById('speed').value);
  const sw = parseFloat(document.getElementById('strokeWidth').value);
  const rainbow = document.getElementById('rainbowToggle').checked;
  const glow = document.getElementById('glowToggle').checked;
  const totalT = computeSteps(R, r);
  const dt = 0.015 * speed;
  const W = canvas.width, H = canvas.height;
  const maxExtent = Math.abs(R - r) + Math.abs(d) + 2;
  const scale = (Math.min(W,H) / 2 - 16) / maxExtent;
  const cx = W/2, cy = H/2;

  function point(angle) {
    const gx = (R - r) * Math.cos(angle);
    const gy = (R - r) * Math.sin(angle);
    const a2 = -((R - r) / r) * angle;
    return [
      cx + (gx + d * Math.cos(a2)) * scale,
      cy + (gy + d * Math.sin(a2)) * scale
    ];
  }

  let [prevX, prevY] = point(0);
  const hsl = hexToHsl(selectedColor);
  let hue = hsl[0];

  const statusBar = document.getElementById('statusBar');
  statusBar.className = 'status-bar running';
  statusBar.textContent = 'DRAWING...';

  function loop() {
    if (!drawing) return;

    for (let i = 0; i < Math.ceil(speed * 0.5); i++) {
      t += dt;
      const [nx, ny] = point(t);
      const progress = t / totalT;

      let color;
      if (rainbow) {
        hue = (hsl[0] + progress * 360) % 360;
        color = `hsl(${hue},90%,65%)`;
      } else {
        color = selectedColor;
      }

      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(nx, ny);
      ctx.strokeStyle = color;
      ctx.lineWidth = sw;
      ctx.lineCap = 'round';

      if (glow) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 8;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      prevX = nx;
      prevY = ny;
    }

    updatePreview();

    const pct = Math.min(100, Math.round((t / totalT) * 100));
    statusBar.textContent = `DRAWING... ${pct}%`;

    if (t >= totalT) {
      drawing = false;
      animId = null;
      statusBar.className = 'status-bar done';
      statusBar.textContent = 'COMPLETE ✓';
      return;
    }

    animId = requestAnimationFrame(loop);
  }

  animId = requestAnimationFrame(loop);
}

// ─── CONTROLS ──────────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', startDraw);

document.getElementById('pauseBtn').addEventListener('click', () => {
  if (drawing) {
    drawing = false;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    document.getElementById('statusBar').className = 'status-bar';
    document.getElementById('statusBar').textContent = 'PAUSED';
    document.getElementById('pauseBtn').textContent = '▶ Resume';
  } else if (animId === null && t > 0) {
    drawing = true;
    document.getElementById('pauseBtn').textContent = '⏸ Pause';
    // resume
    const R = parseFloat(document.getElementById('R').value);
    const r = parseFloat(document.getElementById('r').value);
    const d = parseFloat(document.getElementById('d').value);
    const speed = parseFloat(document.getElementById('speed').value);
    const sw = parseFloat(document.getElementById('strokeWidth').value);
    const rainbow = document.getElementById('rainbowToggle').checked;
    const glow = document.getElementById('glowToggle').checked;
    const totalT = computeSteps(R, r);
    const dt = 0.015 * speed;
    const W = canvas.width, H = canvas.height;
    const maxExtent = Math.abs(R - r) + Math.abs(d) + 2;
  const scale = (Math.min(W,H) / 2 - 16) / maxExtent;
    const cx2 = W/2, cy2 = H/2;
    const hsl = hexToHsl(selectedColor);

    function point(angle) {
      const gx = (R - r) * Math.cos(angle);
      const gy = (R - r) * Math.sin(angle);
      const a2 = -((R - r) / r) * angle;
      return [
        cx2 + (gx + d * Math.cos(a2)) * scale,
        cy2 + (gy + d * Math.sin(a2)) * scale
      ];
    }
    let [prevX, prevY] = point(t);
    const statusBar = document.getElementById('statusBar');
    statusBar.className = 'status-bar running';

    function loop() {
      if (!drawing) return;
      for (let i = 0; i < Math.ceil(speed * 0.5); i++) {
        t += dt;
        const [nx, ny] = point(t);
        const progress = t / totalT;
        let color = rainbow ? `hsl(${(hsl[0] + progress*360)%360},90%,65%)` : selectedColor;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = color;
        ctx.lineWidth = sw;
        ctx.lineCap = 'round';
        if (glow) { ctx.shadowColor = color; ctx.shadowBlur = 8; }
        else ctx.shadowBlur = 0;
        ctx.stroke();
        ctx.shadowBlur = 0;
        prevX = nx; prevY = ny;
      }
      const pct = Math.min(100, Math.round((t / totalT) * 100));
      statusBar.textContent = `DRAWING... ${pct}%`;
      if (t >= totalT) {
        drawing = false; animId = null;
        statusBar.className = 'status-bar done';
        statusBar.textContent = 'COMPLETE ✓';
        return;
      }
      animId = requestAnimationFrame(loop);
    }
    animId = requestAnimationFrame(loop);
  }
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  drawing = false;
  t = 0;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('statusBar').className = 'status-bar';
  document.getElementById('statusBar').textContent = 'CANVAS CLEARED';
  setTimeout(() => {
    const sb = document.getElementById('statusBar');
    if (sb.textContent === 'CANVAS CLEARED') {
      sb.textContent = 'READY';
    }
  }, 1500);
  document.getElementById('pauseBtn').textContent = '⏸ Pause';
  updatePreview();
});

document.getElementById('saveBtn').addEventListener('click', () => {
  // Compose with dark background
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tc = tmp.getContext('2d');
  tc.fillStyle = '#05050e';
  tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(canvas, 0, 0);
  const a = document.createElement('a');
  a.download = 'spirograph.png';
  a.href = tmp.toDataURL();
  a.click();
});

// Set initial status
window.addEventListener('load', () => {
  document.getElementById('statusBar').textContent = 'READY — CLICK DRAW TO BEGIN';
});
</script>
</body>
</html>
